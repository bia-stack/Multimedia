<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <STYLE>
        #color-picker{
            display: inline-flex;
            align-items: center;
            gap:10px;
            margin:10px;
        }
        #colorBox{
            width:30px;
            height:30px;
            border:1px solid black;
            background-color:rgb(0,0,0);
        }
    </STYLE>
    
    
</head>
<body>

    <input id="fileBrowser" type="file" accept="image/*">
    <button id="blue" disabled>Blue</button>
    <button id="reseteaza" disabled>Original</button>
    <button id="grayscale"disabled>Grayscale</button>
    <button id="sepia" disabled>Sepia</button>
    <button id="negative"disabled>Negative</button>
    <button id="download"disabled>Descarcă imaginea filtrată</button>
    <button id="pixelate"disabled>Pixelate</button>


    
    <div class = "slider">
        <input type = "range" min="0" max="200" value="100">
        <span> 50</span>
    </div>   
    
    <div id = "color-picker">
        <div id = "colorBox">
            <span id = "colorValue">RGB(0,0,0)</span>
        </div>
    </div>
    
    <canvas id="visibleCanvas"></canvas>
    <script src="main.js"></script>
    

</body>
</html>
